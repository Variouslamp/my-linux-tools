#######################################################################################
# CONFIGURACIÓN HYPRLAND COMPLETA - Variouslamp (SINTAXIS v0.40+)
########################################################################################

# --- VARIABLES DE ENTORNO (NVIDIA & WAYLAND) ---
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# --- MONITORES ---
# Monitor Laptop (144Hz)
monitor=eDP-1, 1920x1080@144, 0x0, 1
# Monitor Externo (NVIDIA)
monitor=HDMI-A-1, 2560x1440@100, -2560x0, 1

# --- AUTOSTART (EJECUTAR AL INICIO) ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = awww-daemon
exec-once = wal -R -n
exec-once = swaync
exec-once = waybar
exec-once = kdeconnect-indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = rclone mount gdrive: ~/Drive --vfs-cache-mode full
exec-once = ~/my-tools/scripts/sistema/wallpaper/lock-screen


# --- INPUT (TECLADO Y TOUCHPAD) ---
input {
    kb_layout = latam
    
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }

    sensitivity = 0 
}

device {
    name = semico---usb-gaming-keyboard-
    kb_layout = us
    kb_variant = altgr-intl
}

# --- ESTÉTICA (GAPS Y BORDES) ---
general {
    gaps_in = 6
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = dwindle
}

decoration {
    rounding = 5
    
    dim_inactive = true
    dim_strength = 0.2

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = false
    }
}

# --- ANIMACIONES ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 7, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 4, default
}

# --- ATAJOS DE TECLADO (BINDS) ---
$mainMod = SUPER

# Mover y redimensionar ventanas con el mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Atajos del sistema
bind = $mainMod SHIFT, S, exec, hyprctl reload
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit

# Aplicaciones principales
bind = $mainMod, A, exec, rofi -show drun
bind = $mainMod, Q, exec, bash -c "~/my-tools/scripts/sistema/fterm"
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, kitty yazi
bind = $mainMod, C, killactive, 
bind = $mainMod SHIFT, SPACE, togglefloating, 
bind = $mainMod SHIFT, W, exec, ~/my-tools/scripts/sistema/wallpaper/autofondo.sh
bind = $mainMod, W, exec, ~/my-tools/scripts/sistema/wallpaper/rofi_wallpaper_select.sh
bind = $mainMod, F, fullscreen, 
bind = $mainMod, B, exec, firefox
bind = $mainMod, R, exec, wmctrl -a ferdium || ferdium
bind = $mainMod, L, exec, ~/my-tools/scripts/sistema/wallpaper/lock-screen

# Captura de pantalla
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Imagenes/ScreenShots/$(date +'%Y-%m-%d_%H%M%S').png | wl-copy

# Control de brillo de la pantalla
bind = $mainMod, F10, exec, brightnessctl set +5%
bind = $mainMod, F9, exec, brightnessctl set 5%-

# Navegación (Foco)
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

# Mover ventanas
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d

# Redimensionar (Resize)
binde = $mainMod CTRL, Left, resizeactive, -20 0
binde = $mainMod CTRL, Right, resizeactive, 20 0
binde = $mainMod CTRL, Up, resizeactive, 0 -20
binde = $mainMod CTRL, Down, resizeactive, 0 20

# Workspaces (1-0)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover a Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Extras y Multimedia
bind = $mainMod, J, togglesplit, 
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, N, exec, swaync-client -C
bind = $mainMod SHIFT, R, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"

binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+

# --- REGLAS DE VENTANA (WINDOW RULES) ---

# Aplicaciones específicas
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, size 640 360
windowrule = match:class ^(scratchterm)$, float on
windowrule = match:class ^(scratchterm)$, size 85% 70%
windowrule = match:class ^(float-term)$, float on
windowrule = match:class ^(float-term)$, center on

# Ventanas de Inicio (start-*)
windowrule = match:title ^(start-clock)$, float on
windowrule = match:title ^(start-clock)$, move 1000 40

windowrule = match:title ^(start-cow)$, float on
windowrule = match:title ^(start-cow)$, move 100 400
windowrule = match:title ^(start-cow)$, size 300 260

windowrule = match:title ^(start-fetch)$, float on
windowrule = match:title ^(start-fetch)$, move 1000 500
windowrule = match:title ^(start-fetch)$, size 750 300

windowrule = match:title ^(start-tube)$, float on
windowrule = match:title ^(start-tube)$, move 10 10
windowrule = match:title ^(start-tube)$, size 800 400

# Popups y Otros
windowrule = match:title ^(popup-.*)$, float on
windowrule = match:title ^(popup-.*)$, center on

# Blurs para capas (Waybar)
blurls = waybar
blurls = swaync
